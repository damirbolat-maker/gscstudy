<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Тест — GSC Study</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#2563EB;--blue2:#1D4ED8;--blue3:#EFF4FF;--blue4:#DBEAFE;
      --ink:#0E0E14;--ink2:#1C1C28;--muted:#7B7885;--muted2:#B0ADB8;
      --white:#FAFAF8;--white2:#F2F0EB;--white3:#E8E5DE;
      --border:rgba(14,14,20,.1);--border2:rgba(14,14,20,.16);
      --green:#22C55E;--red:#EF4444;
      --fd:'Syne',sans-serif;--f:'DM Sans',sans-serif;
      --r:10px;--rx:22px;--spring:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--f);background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
    a{text-decoration:none;color:inherit}
    #sp{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--blue),#6D28D9);z-index:9999;transition:width .15s}
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;height:66px;display:flex;align-items:center;background:rgba(250,250,248,.92);backdrop-filter:blur(20px);border-bottom:1px solid transparent;transition:.3s}
    .nav.scrolled{border-bottom-color:var(--border);box-shadow:0 2px 20px rgba(14,14,20,.06)}
    .nav-inner{max-width:1280px;margin:0 auto;padding:0 28px;width:100%;display:flex;align-items:center;gap:24px}
    .logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:auto}
    .logo-img{height:44px;width:auto}
    .nl{padding:7px 13px;border-radius:100px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:.18s}
    .nl:hover{color:var(--ink);background:var(--white2)}
    .nav-cta{padding:9px 20px;background:var(--blue);color:#fff;border-radius:100px;font-size:13px;font-weight:700;text-decoration:none;margin-left:16px;transition:.2s var(--spring)}
    .nav-cta:hover{background:var(--blue2);transform:scale(1.04)}

    /* PROGRESS */
    .pb-wrap{position:sticky;top:66px;z-index:50;height:4px;background:var(--white2)}
    .pb{height:100%;background:linear-gradient(90deg,var(--blue),#6D28D9);width:0;transition:width .5s var(--ease)}

    /* QUESTION SCREEN */
    .q-screen{min-height:100vh;padding-top:66px}
    .q-shell{max-width:800px;margin:0 auto;padding:36px 24px 60px}
    .q-top{display:flex;align-items:center;gap:10px;margin-bottom:30px}
    .back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--f);transition:.15s;padding:4px 0;margin-right:auto}
    .back-btn:hover{color:var(--ink)}
    .q-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em}
    .q-timer{font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--ink)}
    .q-timer.warn{color:var(--red);animation:tp .6s ease infinite alternate}
    @keyframes tp{from{opacity:1}to{opacity:.35}}
    .q-counter{font-size:12px;color:var(--muted);font-weight:500}
    .q-card{background:var(--white);border:2px solid var(--border2);border-radius:24px;padding:34px;animation:qIn .32s var(--ease) both}
    @keyframes qIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .q-sect{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
    .q-text{font-family:var(--fd);font-size:20px;font-weight:700;line-height:1.35;margin-bottom:8px}
    .q-hint{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:22px;line-height:1.6;border-left:3px solid var(--blue4);padding-left:12px}
    .opts{display:flex;flex-direction:column;gap:9px}
    .opt{display:flex;align-items:center;gap:13px;padding:13px 17px;border:2px solid var(--border2);border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s,transform .18s var(--spring);font-size:14px;font-weight:500;user-select:none}
    .opt:hover{border-color:var(--blue);background:var(--blue3);transform:translateX(4px)}
    .opt.sel{border-color:var(--blue);background:var(--blue3);color:var(--blue)}
    .opt.ok{border-color:var(--green);background:#F0FDF4;color:#166534}
    .opt.no{border-color:var(--red);background:#FEF2F2;color:#991B1B}
    .opt-l{width:30px;height:30px;border-radius:50%;background:var(--white2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:.15s}
    .opt.sel .opt-l{background:var(--blue);border-color:var(--blue);color:#fff}
    .opt.ok .opt-l{background:var(--green);border-color:var(--green);color:#fff}
    .opt.no .opt-l{background:var(--red);border-color:var(--red);color:#fff}
    .q-actions{display:flex;align-items:center;margin-top:16px;gap:14px}
    .q-fb{font-size:13px;font-weight:700;flex:1}
    .q-fb.ok{color:var(--green)}.q-fb.no{color:var(--red)}
    .btn-next{padding:12px 26px;background:var(--blue);color:#fff;border:none;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;transition:.18s var(--spring);margin-left:auto;display:flex;align-items:center;gap:7px}
    .btn-next:hover{background:var(--blue2);transform:scale(1.05)}
    .btn-next:disabled{opacity:.3;cursor:default;transform:none}

    /* RESULT */
    .r-screen{display:none;min-height:100vh;padding-top:66px;align-items:center;justify-content:center}
    .r-screen.on{display:flex}
    .r-wrap{max-width:600px;width:100%;padding:24px;margin:0 auto}
    .r-card{background:var(--white);border:2px solid var(--border2);border-radius:28px;padding:44px 36px;text-align:center;animation:qIn .5s var(--ease) both;box-shadow:0 8px 40px rgba(0,0,0,.07)}
    .r-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 18px}
    .r-level{font-family:'Manrope',sans-serif;font-size:68px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:5px}
    .r-label{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:10px}
    .r-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:26px;max-width:440px;margin-left:auto;margin-right:auto}
    .r-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
    .rs{background:var(--white2);border-radius:var(--r);padding:14px}
    .rs-n{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:3px}
    .rs-l{font-size:10px;color:var(--muted);font-weight:500}
    .r-cta{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;background:#25D366;color:#fff;border:none;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;text-decoration:none;transition:.2s var(--spring);font-family:var(--f)}
    .r-cta:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(37,211,102,.35)}
    .r-retry{width:100%;padding:12px 18px;border-radius:100px;border:2px solid var(--border2);background:transparent;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:.18s}
    .r-retry:hover{border-color:var(--blue);color:var(--blue)}
  </style>
</head>
<body>
  <div id="sp"></div>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="logo" href="/index.html"><img class="logo-img" src="logo.png" alt="GSC Study"></a>
      <a class="nl" href="/index.html#tests">Тесты</a>
      <a class="nav-cta" href="/index.html" id="cta">На главную</a>
    </div>
  </nav>
  <div class="pb-wrap"><div class="pb" id="pb"></div></div>

  <div class="q-screen" id="scrQ">
    <div class="q-shell">
      <div class="q-top">
        <button class="back-btn" onclick="goHome()">← На главную</button>
        <div class="q-badge" id="qBadge" style="background:#2563EB">TEST</div>
        <div class="q-timer" id="qTimer"></div>
        <div class="q-counter" id="qCounter">0 / 0</div>
      </div>
      <div class="q-card" id="qCard">
        <div class="q-sect" id="qSect"></div>
        <div class="q-text" id="qText"></div>
        <div class="q-hint" id="qHint" style="display:none"></div>
        <div class="opts" id="qOpts"></div>
      </div>
      <div class="q-actions">
        <div class="q-fb" id="qFb"></div>
        <button class="btn-next" id="btnNext" disabled onclick="nextQ()">Далее ›</button>
      </div>
    </div>
  </div>

  <div class="r-screen" id="scrR">
    <div class="r-wrap">
      <div class="r-card">
        <div class="r-icon" id="rIcon"></div>
        <div class="r-level" id="rLvl"></div>
        <div class="r-label" id="rLbl"></div>
        <div class="r-desc" id="rDesc"></div>
        <div class="r-stats" id="rStats"></div>
        <a class="r-cta" id="rCTA" target="_blank">💬 Получить рекомендации в WhatsApp</a>
        <button class="r-retry" onclick="goHome()">← На главную</button>
      </div>
    </div>
  </div>

  <script>
  // Minimal test runner that reuses KV-backed questions from tests.html style.
  var TESTS = {
    ielts:{ name:'IELTS',color:'#2563EB',icon:'📝',time:900,qs:[] },
    sat:{ name:'SAT',color:'#6D28D9',icon:'📐',time:900,qs:[] },
    english:{ name:'English',color:'#00A060',icon:'🗣',time:900,qs:[] },
    kids:{ name:'Kids',color:'#00A060',icon:'🧒',time:900,qs:[] }
  };

  function setPB(pct){var b=document.getElementById('pb');if(b)b.style.width=pct+'%';}
  function goHome(){ window.location.href='/tests.html'; }
  function tr(x){ return x; }
  function fmt(t,vars){ return t; }

  var ST={type:null,qi:0,correct:0,tmr:null,tl:0,answered:false};
  var _lead=null;

  function cleanPhone(p){return (p||'').toString().replace(/[^\d+]/g,'').trim();}
  async function kvGet(key){
    try{
      var r = await fetch('/api/data?key=' + encodeURIComponent(key));
      if(!r.ok) return null;
      var j = await r.json().catch(function(){return null;});
      return j && ('value' in j) ? j.value : null;
    }catch(e){ return null; }
  }
  function normQ(row){
    if(!row) return null;
    var o = row.options || row.o || row.opts;
    var arr = Array.isArray(o) ? o : null;
    if(!Array.isArray(arr)) arr = [row.opt_a,row.opt_b,row.opt_c,row.opt_d].filter(function(x){return x!==undefined;});
    var opts = (arr||[]).slice(0,4).map(function(x){
      if(x && typeof x === 'object') return (x.text || '');
      return String(x||'');
    });
    while(opts.length<4) opts.push('');
    var a = row.answer ?? row.a ?? row.answer_index ?? 0;
    a = Math.max(0, Math.min(3, parseInt(a,10)||0));
    return { s: row.section || row.s || '', t: row.question || row.t || row.text || '', h: row.hint || row.h || '', o: opts, a: a };
  }

  function updateTmr(){
    var m=Math.floor(ST.tl/60).toString().padStart(2,'0');
    var s=(ST.tl%60).toString().padStart(2,'0');
    var el=document.getElementById('qTimer');
    if(el){el.textContent='⏱ '+m+':'+s;el.className='q-timer'+(ST.tl<60?' warn':'');}
  }

  function renderQ(){
    var test=TESTS[ST.type]; if(!test) return;
    var q=test.qs[ST.qi];
    var total=test.qs.length;
    setPB(Math.round(ST.qi/total*100));
    var ctr=document.getElementById('qCounter'); if(ctr) ctr.textContent=(ST.qi+1)+' / '+total;
    var sect=document.getElementById('qSect'); if(sect) sect.textContent=q.s||'';
    var text=document.getElementById('qText'); if(text) text.textContent=q.t||'';
    var hint=document.getElementById('qHint');
    if(hint){ if(q.h){hint.style.display='block';hint.textContent=q.h;} else {hint.style.display='none';} }
    var opts=document.getElementById('qOpts');
    if(opts){
      opts.innerHTML = (q.o||[]).map(function(v,i){
        var l=String.fromCharCode(65+i);
        return '<div class=\"opt\" onclick=\"pick('+i+')\"><div class=\"opt-l\">'+l+'</div><div>'+escapeHtml(v)+'</div></div>';
      }).join('');
    }
    var fb=document.getElementById('qFb'); if(fb){fb.textContent='';fb.className='q-fb';}
    var next=document.getElementById('btnNext'); if(next) next.disabled=true;
  }

  function escapeHtml(s){return String(s||'').replace(/[&<>\"]/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]);});}

  function pick(i){
    if(ST.answered) return;
    var test=TESTS[ST.type];
    var q=test.qs[ST.qi];
    ST.answered=true;
    var opts=document.querySelectorAll('.opt');
    opts.forEach(function(el,idx){ el.classList.toggle('sel', idx===i); });
    var ok = (i===q.a);
    if(ok) ST.correct++;
    opts.forEach(function(el,idx){
      if(idx===q.a) el.classList.add('ok');
      else if(idx===i && !ok) el.classList.add('no');
    });
    var fb=document.getElementById('qFb');
    if(fb){fb.textContent = ok ? 'Верно ✓' : 'Неверно'; fb.className='q-fb ' + (ok?'ok':'no');}
    var next=document.getElementById('btnNext'); if(next) next.disabled=false;
  }

  function nextQ(){
    var test=TESTS[ST.type];
    ST.qi++;
    if(ST.qi>=test.qs.length) finishTest();
    else{ST.answered=false;renderQ();}
  }

  function finishTest(){
    clearInterval(ST.tmr); setPB(100);
    var test=TESTS[ST.type];
    var total=test.qs.length;
    var score=ST.correct;
    var pct=Math.round(score/total*100);
    var level = pct + '%';
    var label = 'Результат';
    var desc = 'Спасибо! Мы отправим рекомендации.';
    var iconBg='#EFF4FF', color=test.color;
    var icon=document.getElementById('rIcon');
    var rLvl=document.getElementById('rLvl');
    var rLbl=document.getElementById('rLbl');
    var rDesc=document.getElementById('rDesc');
    var rSts=document.getElementById('rStats');
    var rCTA=document.getElementById('rCTA');
    if(icon){icon.textContent=test.icon;icon.style.background=iconBg;}
    if(rLvl){rLvl.textContent=level;rLvl.style.color=color;}
    if(rLbl)rLbl.textContent=label;
    if(rDesc)rDesc.textContent=desc;
    if(rSts)rSts.innerHTML=
      '<div class=\"rs\"><div class=\"rs-n\" style=\"color:'+color+'\">'+score+'</div><div class=\"rs-l\">Верно</div></div>'+
      '<div class=\"rs\"><div class=\"rs-n\">'+(total-score)+'</div><div class=\"rs-l\">Неверно</div></div>'+
      '<div class=\"rs\"><div class=\"rs-n\">'+pct+'%</div><div class=\"rs-l\">Точность</div></div>';
    if(rCTA)rCTA.href='https://wa.me/77718080828?text='+encodeURIComponent('Привет! Я прошёл(а) '+test.name+' и хочу рекомендации. Мой результат: '+score+'/'+total+' ('+pct+'%).');

    // Save result to API
    if(_lead && _lead.name && _lead.phone){
      fetch('/api/test-results', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:_lead.name,phone:_lead.phone,test_type:ST.type,test_name:test.name,score:score,total:total,level:String(level)})}).catch(function(){});\n    }

    document.getElementById('scrQ').style.display='none';
    var r=document.getElementById('scrR'); r.classList.add('on');
  }

  function parseType(){
    var h=(location.hash||'').replace('#','').toLowerCase().trim();
    var q=new URL(location.href).searchParams.get('type');
    var t=(q||h||'').toLowerCase().trim();
    if(t==='kids') t='kids';
    if(!TESTS[t]) t='english';
    return t;
  }

  async function boot(){
    var type=parseType();
    var rows = await kvGet('test_questions_' + type);
    if(rows && Array.isArray(rows)){
      var qs = rows.slice().sort(function(a,b){return (a.sort_order||0)-(b.sort_order||0);}).map(normQ).filter(Boolean);
      if(qs.length) TESTS[type].qs = qs;
    }
    if(!TESTS[type].qs.length){
      // fallback: redirect to tests selector
      window.location.href='/tests.html#' + type;
      return;
    }
    ST.type=type; ST.qi=0; ST.correct=0; ST.answered=false; ST.tl=TESTS[type].time;
    var badge=document.getElementById('qBadge');
    if(badge){badge.textContent=TESTS[type].icon+' '+TESTS[type].name; badge.style.background=TESTS[type].color;}
    updateTmr();
    clearInterval(ST.tmr);
    ST.tmr=setInterval(function(){ ST.tl--; updateTmr(); if(ST.tl<=0){ clearInterval(ST.tmr); finishTest(); } },1000);
    renderQ();
  }

  // Lead modal integration: open lead first, then start test
  window._LEAD_AFTER_SUCCESS = function(lead){ _lead = {name:lead.name, phone:cleanPhone(lead.phone)}; setTimeout(boot, 10); };
  document.addEventListener('DOMContentLoaded', function(){
    // open lead modal from shared script (injected below)
    var type=parseType();
    var product='Тест: ' + (TESTS[type] ? TESTS[type].name : 'English');
    // openLead is defined in shared lead script
    if (typeof openLead === 'function') openLead(product, 'Тест');
  });
  </script>

  <!-- Shared lead modal (injected from index.html build step) -->
  <!-- NOTE: this file relies on the same lead modal markup+script as other pages -->
  <div class="lead-modal" id="leadModal" aria-hidden="true">
    <div class="lead-ov" data-lead-close></div>
    <div class="lead-box" role="dialog" aria-modal="true" aria-label="Заявка">
      <div class="lead-top">
        <h3 class="lead-h" id="leadTitle">Оставить заявку</h3>
        <button class="lead-x" type="button" data-lead-close>✕</button>
      </div>
      <p class="lead-sub" id="leadSub">Оставь контакты — мы подберём программу и свяжемся в ближайшее время.</p>
      <form id="leadForm">
        <div class="lead-row">
          <div class="lead-f">
            <label class="lead-l">Имя</label>
            <input class="lead-i" name="name" placeholder="Например: Дамир" autocomplete="name" required>
          </div>
          <div class="lead-f">
            <label class="lead-l">Город</label>
            <input class="lead-i" name="city" placeholder="Астана / Алматы" autocomplete="address-level2" required>
          </div>
        </div>
        <div class="lead-row">
          <div class="lead-f">
            <label class="lead-l">Телефон</label>
            <input class="lead-i" name="phone" placeholder="+7 ___ ___ __ __" autocomplete="tel" required>
          </div>
          <div class="lead-f">
            <label class="lead-l">Email (необязательно)</label>
            <input class="lead-i" name="email" placeholder="name@example.com" autocomplete="email">
          </div>
        </div>
        <input type="hidden" name="source" id="leadSource">
        <input type="hidden" name="product" id="leadProduct">
        <div class="lead-err" id="leadErr"></div>
        <button class="lead-btn" type="submit" id="leadSubmit">Отправить →</button>
        <div class="lead-priv">Нажимая «Отправить», ты соглашаешься на обработку персональных данных.</div>
      </form>
    </div>
  </div>
  <script>
  (function(){
    // copy of lead script from index.html (short, required for test.html)
    var modal=document.getElementById('leadModal');
    if(!modal) return;
    var form=document.getElementById('leadForm');
    var err=document.getElementById('leadErr');
    var srcInp=document.getElementById('leadSource');
    var prodInp=document.getElementById('leadProduct');
    var titleEl=document.getElementById('leadTitle');
    var submitBtn=document.getElementById('leadSubmit');
    var lastFocus=null;

    window.openLead = function(product, source){
      lastFocus=document.activeElement;
      srcInp.value=source||'Сайт';
      prodInp.value=product||'';
      if(titleEl){ titleEl.textContent = product ? ('Оставить заявку — ' + product) : 'Оставить заявку'; }
      err.style.display='none'; err.textContent='';
      modal.classList.add('on'); modal.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
      setTimeout(function(){ var first=form.querySelector('input[name=\"name\"]'); first && first.focus(); },0);
    };
    function closeLead(){
      modal.classList.remove('on'); modal.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
      if(lastFocus && lastFocus.focus) lastFocus.focus();
    }
    modal.addEventListener('click', function(e){ if(e.target && e.target.hasAttribute('data-lead-close')) closeLead(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape' && modal.classList.contains('on')) closeLead(); });
    function cleanPhone(p){return (p||'').toString().replace(/[^\d+]/g,'').trim();}
    function isEmail(v){return !v || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
    function getUtm(){ try{var u=new URL(location.href);var keys=['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];var out=[];keys.forEach(function(k){var v=u.searchParams.get(k); if(v) out.push(k+'='+v);});return out.join('&');}catch(e){return '';} }
    async function sendLeadToApi(lead){
      var res=await fetch('/api/leads', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lead)});
      var json=null; try{json=await res.json();}catch(e){}
      if(!res.ok || !json || !json.ok) throw new Error((json&&json.error)||('http_'+res.status));
      return json;
    }
    form.addEventListener('submit', async function(e){
      e.preventDefault();
      var fd=new FormData(form);
      var lead={
        name:(fd.get('name')||'').toString().trim(),
        city:(fd.get('city')||'').toString().trim(),
        phone:cleanPhone(fd.get('phone')),
        email:(fd.get('email')||'').toString().trim(),
        source:(fd.get('source')||'').toString().trim()||'Сайт',
        product:(fd.get('product')||'').toString().trim(),
        page:location.pathname + location.hash,
        utm:getUtm(),
        created_at:new Date().toISOString()
      };
      if(!lead.name || !lead.city || !lead.phone){ err.textContent='Заполни: имя, город и телефон.'; err.style.display='block'; return; }
      if(!isEmail(lead.email)){ err.textContent='Проверь email (или оставь пустым).'; err.style.display='block'; return; }
      submitBtn.disabled=true; submitBtn.textContent='Отправляем...';
      try{
        var resp = await sendLeadToApi(lead);
        try{ if(window._LEAD_AFTER_SUCCESS) window._LEAD_AFTER_SUCCESS(lead, resp); }catch(e2){}
        submitBtn.textContent='Готово ✓';
        setTimeout(function(){ closeLead(); submitBtn.disabled=false; submitBtn.textContent='Отправить →'; form.reset(); },400);
      }catch(ex){
        err.textContent='Не удалось отправить. Попробуй позже.'; err.style.display='block';
        submitBtn.disabled=false; submitBtn.textContent='Отправить →';
      }
    });
  })();
  </script>
</body>
